name: Publish (manual)

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish to bit.cloud"
        required: true
        type: choice
        default: all
        options:
          - all
          - "@evinova-demo/theme"
          - "@evinova-demo/utils"
          - "@evinova-demo/hooks"
          - "@evinova-demo/button"
          - "@evinova-demo/card"

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      BIT_CLOUD_TOKEN: ${{ secrets.BIT_CLOUD_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Configure registry auth
        run: pnpm config set "//node-registry.bit.cloud/:_authToken" "$BIT_CLOUD_TOKEN"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      - name: Publish all packages (bulk)
        if: inputs.package == 'all'
        run: pnpm -r publish --batch --no-git-checks

      - name: Publish one package
        if: inputs.package != 'all'
        run: pnpm --filter "${{ inputs.package }}" publish --no-git-checks
